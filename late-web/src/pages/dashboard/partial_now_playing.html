<div class="p-6 bg-gray-900 rounded-lg shadow-lg border border-gray-800"
    id="now-playing-widget"
    x-data="{ is_live: {% if is_live %}true{% else %}false{% endif %} }">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-2xl font-bold text-white">{{ username }}'s Stream</h2>
        </div>
        <div class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider {% if is_live %}bg-red-500/20 text-red-400 border border-red-500/50{% else %}bg-gray-700 text-gray-400{% endif %}"
            :class="{ 'bg-red-500/20 text-red-400 border border-red-500/50': is_live, 'bg-gray-700 text-gray-400': !is_live }">
            <span x-text="is_live ? 'LIVE' : 'OFFLINE'">{% if is_live %}LIVE{% else %}OFFLINE{% endif %}</span>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="bg-gray-800 p-4 rounded border border-gray-700">
            <p class="text-xs text-gray-500 uppercase">Listeners</p>
            <p class="text-2xl font-mono text-blue-400">{{ viewer_count }}</p>
        </div>

        <div class="bg-gray-800 p-4 rounded border border-gray-700">
            <p class="text-xs text-gray-500 uppercase">Controls</p>
            <button @click="is_live = !is_live"
                class="mt-1 text-sm text-gray-300 hover:text-white underline decoration-dotted">
                Toggle Live State
            </button>
        </div>
    </div>
</div>
