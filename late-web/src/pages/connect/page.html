{% extends "pages/layout.html" %}

{% block page %}
<script>
    window.lateYoutubeApiReady = false;
    window.onYouTubeIframeAPIReady = function () {
        window.lateYoutubeApiReady = true;
        window.dispatchEvent(new Event('late-youtube-ready'));
    };

    function player() {
        return {
            ws: null,
            status: 'connecting',
            audioMode: 'icecast',
            token: '{{ token }}',
            apiUrl: '{{ api_url }}',
            audioUrl: '{{ audio_url }}',
            streamUrl: '{{ audio_url }}',
            ytPlayer: null,
            ytReady: false,
            pendingYoutubeItem: null,
            currentYoutubeItem: null,
            lastYoutubeReloadAt: 0,
            copied: null,
            volumePercent: 30,
            muted: false,
            audioEnabled: false,
            autoplayBlocked: false,
            wsRetries: 0,
            audioRetries: 0,
            userOverrideMode: 'icecast',
            serverAudioMode: 'icecast',
            webIcecastEnabled: true,
            unmuteOnNextPlay: false,
            stationName: null,
            nowPlayingMounts: {},
            radioTracks: {},
            youtubeTrack: null,

            init() {
                this.$refs.audio.src = this.audioUrl;
                this.$refs.audio.volume = this.volumePercent / 100;
                this.$refs.audio.muted = this.muted;

                this.$refs.audio.addEventListener('error', (e) => {
                    if (this.status === 'disconnected' || !this.streamElementEnabled()) return;
                    console.error('Audio stream error', e);
                    this.handleAudioError();
                });

                this.$refs.audio.addEventListener('ended', () => {
                    if (this.status === 'disconnected' || !this.streamElementEnabled()) return;
                    console.warn('Audio stream ended unexpectedly');
                    this.handleAudioError();
                });

                if (this.token) {
                    this.connectWs();
                }

                const onYoutubeReady = () => {
                    this.ytReady = true;
                    if (this.audioMode === 'youtube') {
                        this.ensureYoutubePlayer();
                    }
                };
                window.addEventListener('late-youtube-ready', onYoutubeReady);
                if (window.lateYoutubeApiReady) {
                    onYoutubeReady();
                }
            },

            handleAudioError() {
                if (!this.isStreamElementMode() || !this.streamElementEnabled()) {
                    return;
                }
                this.audioRetries++;
                if (this.audioRetries > 10) {
                    console.error('Audio stream failed 10 times consecutively, giving up.');
                    this.disconnect();
                    return;
                }

                this.status = 'buffering';
                console.log(`Reconnecting audio stream... (attempt ${this.audioRetries})`);

                setTimeout(() => {
                    if (this.status === 'disconnected' || !this.isStreamElementMode() || !this.streamElementEnabled()) {
                        return;
                    }
                    const audio = this.$refs.audio;
                    const streamUrl = this.currentStreamUrl();
                    const separator = streamUrl.includes('?') ? '&' : '?';
                    audio.src = `${streamUrl}${separator}t=${Date.now()}`;
                    audio.load();
                    audio.play().then(() => {
                        if (!this.isStreamElementMode() || !this.streamElementEnabled()) return;
                        this.audioRetries = 0;
                        this.status = 'playing';
                    }).catch(e => {
                        if (!this.isStreamElementMode() || !this.streamElementEnabled()) return;
                        console.error("Playback restart failed:", e);
                        this.handleAudioError();
                    });
                }, 2000);
            },

            copy(text) {
                navigator.clipboard.writeText(text);
                this.copied = text;
                setTimeout(() => this.copied = null, 2000);
            },

            connectWs() {
                if (this.status !== 'playing' && this.status !== 'buffering') {
                    this.status = 'connecting';
                }

                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${this.apiUrl}/api/ws/pair?token=${this.token}`;

                this.ws = new WebSocket(wsUrl);

                this.ws.onopen = () => {
                    this.wsRetries = 0;
                    this.sendClientState();
                    if (this.status !== 'playing' && this.status !== 'buffering') {
                        this.status = 'ready';
                    }
                };

                this.ws.onmessage = (event) => {
                    let payload;
                    try {
                        payload = JSON.parse(event.data);
                    } catch (e) {
                        console.error('Invalid WS payload', e);
                        return;
                    }

                    switch (payload.event) {
                        case 'toggle_mute':
                            this.toggleLocalMute();
                            break;
                        case 'volume_up':
                            this.adjustLocalVolume(5);
                            break;
                        case 'volume_down':
                            this.adjustLocalVolume(-5);
                            break;
                        case 'source_changed':
                            this.applyServerSourceMode(payload.audio_mode);
                            break;
                        case 'load_video':
                            this.loadYoutubeVideo(payload);
                            break;
                        case 'queue_update':
                            this.youtubeTrack = payload.current || null;
                            break;
                        case 'now_playing_update':
                            this.nowPlayingMounts = payload.mounts || {};
                            break;
                        case 'radio_meta_update':
                            this.radioTracks = payload.stations || {};
                            break;
                        case 'set_playback_source':
                            this.applyUserPlaybackSource(payload.source, payload.web_icecast_enabled, payload.stream_url, payload.station);
                            break;
                    }
                };

                this.ws.onclose = () => {
                    if (this.status === 'disconnected') return;

                    this.wsRetries++;
                    if (this.wsRetries > 10) {
                        console.error('WS failed 10 times consecutively, giving up.');
                        return;
                    }

                    // Attempt to reconnect after a short delay
                    setTimeout(() => {
                        if (this.status !== 'disconnected' && this.token) {
                            this.connectWs();
                        }
                    }, 2000);
                };

                this.ws.onerror = (e) => {
                    console.error('WS Error', e);
                };
            },

            startPlayback() {
                this.audioEnabled = true;
                this.status = 'buffering';

                // Reconnect WS if it was closed during disconnect
                if (this.token && (!this.ws || this.ws.readyState !== WebSocket.OPEN)) {
                    this.wsRetries = 0;
                    this.connectWs();
                }

                if (this.audioMode === 'youtube') {
                    this.ensureYoutubePlayer();
                    const itemToPlay = this.pendingYoutubeItem || this.currentYoutubeItem;
                    if (itemToPlay) {
                        this.playYoutubeItem(itemToPlay);
                    } else if (this.autoplayBlocked && this.ytPlayer && this.ytPlayer.playVideo) {
                        this.autoplayBlocked = false;
                        this.status = 'buffering';
                        this.ytPlayer.playVideo();
                    }
                    return;
                }

                if (!this.streamElementEnabled()) {
                    this.stopIcecastAudio();
                    this.status = 'ready';
                    return;
                }

                const audio = this.$refs.audio;
                const streamUrl = this.currentStreamUrl();
                const separator = streamUrl.includes('?') ? '&' : '?';
                audio.src = `${streamUrl}${separator}t=${Date.now()}`;
                audio.play().then(() => {
                    if (!this.isStreamElementMode() || !this.streamElementEnabled()) return;
                    this.audioRetries = 0;
                    this.status = 'playing';
                }).catch(e => {
                    if (!this.isStreamElementMode() || !this.streamElementEnabled()) return;
                    console.error("Playback failed:", e);
                    this.handleAudioError();
                });
            },

            disconnect() {
                const audio = this.$refs.audio;
                if (audio) {
                    audio.pause();
                    audio.src = '';
                }

                if (this.ytPlayer && this.ytPlayer.stopVideo) {
                    this.ytPlayer.stopVideo();
                }

                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.close();
                }

                this.status = 'disconnected';
            },

            stopIcecastAudio() {
                const audio = this.$refs.audio;
                if (!audio) return;
                audio.pause();
                audio.removeAttribute('src');
                audio.load();
            },

            isStreamElementMode(mode = this.audioMode) {
                return mode === 'icecast' || mode === 'radio';
            },

            streamElementEnabled() {
                return this.isStreamElementMode() && this.webIcecastEnabled;
            },

            currentStreamUrl() {
                return this.streamUrl || this.audioUrl;
            },

            toggleLocalMute() {
                this.applyMuteState(!this.muted);
            },

            applyMuteState(muted) {
                this.muted = !!muted;
                const audio = this.$refs.audio;
                if (audio) {
                    audio.muted = this.muted;
                }
                if (this.ytPlayer) {
                    if (this.muted && this.ytPlayer.mute) {
                        this.ytPlayer.mute();
                    } else if (!this.muted && this.ytPlayer.unMute) {
                        this.ytPlayer.unMute();
                    }
                }
                this.sendClientState();
            },

            adjustLocalVolume(delta) {
                this.volumePercent = Math.max(0, Math.min(100, this.volumePercent + delta));
                this.$refs.audio.volume = this.volumePercent / 100;
                if (this.ytPlayer && this.ytPlayer.setVolume) {
                    this.ytPlayer.setVolume(this.volumePercent);
                }
                this.sendClientState();
            },

            sendClientState() {
                if (!this.ws || this.ws.readyState !== WebSocket.OPEN) {
                    return;
                }
                this.ws.send(JSON.stringify({
                    event: 'client_state',
                    client_kind: 'browser',
                    muted: this.muted,
                    volume_percent: this.volumePercent,
                }));
            },

            // Apply a server-pushed user preference. The TUI's v+x keybind
            // flips the value in the DB and broadcasts `set_playback_source`;
            // we just apply whatever the server tells us, no local toggling.
            applyUserPlaybackSource(source, webIcecastEnabled = null, streamUrl = null, station = null) {
                if (source !== 'icecast' && source !== 'youtube' && source !== 'radio') {
                    return;
                }
                const previousStreamUrl = this.streamUrl;
                if (typeof streamUrl === 'string' && streamUrl.length > 0) {
                    this.streamUrl = streamUrl;
                } else if (source === 'icecast') {
                    this.streamUrl = this.audioUrl;
                }
                if (typeof station === 'string' && station.length > 0) {
                    this.stationName = station;
                }
                const previousWebIcecastEnabled = this.webIcecastEnabled;
                if (typeof webIcecastEnabled === 'boolean') {
                    this.webIcecastEnabled = webIcecastEnabled;
                }
                this.userOverrideMode = source;

                const webIcecastPolicyChanged = previousWebIcecastEnabled !== this.webIcecastEnabled;
                // A new stream URL on the SAME source (v+1..4 stream/station
                // switch) must re-point the audio element too, not just store
                // the URL for the next reconnect.
                const streamUrlChanged = previousStreamUrl !== this.streamUrl;
                if (this.audioMode !== source || (this.isStreamElementMode(source) && (webIcecastPolicyChanged || streamUrlChanged))) {
                    this.applySourceMode(source);
                } else if (this.isStreamElementMode(source) && !this.webIcecastEnabled) {
                    this.stopIcecastAudio();
                    this.status = 'ready';
                }
            },

            currentStation(mode = this.audioMode) {
                if (this.stationName) return this.stationName;
                if (mode === 'icecast') return 'chill';
                if (mode === 'radio') return 'chillsynth';
                return null;
            },

            sourceBannerText() {
                if (this.audioMode === 'youtube') return 'youtube · community queue';
                return `${this.audioMode} · ${this.currentStation()}`;
            },

            nowPlayingText() {
                if (this.audioMode === 'youtube') {
                    const item = this.youtubeTrack;
                    if (!item) return 'fallback stream';
                    const title = item.title || `yt:${item.video_id}`;
                    return item.channel ? `${item.channel} - ${title}` : title;
                }
                if (this.audioMode === 'icecast') {
                    const track = this.nowPlayingMounts[this.currentStation('icecast')];
                    if (!track || !track.title) return 'no signal';
                    return track.artist ? `${track.artist} - ${track.title}` : track.title;
                }
                const meta = this.radioTracks[this.currentStation('radio')];
                if (!meta || !meta.title) return 'live';
                return `${meta.artist} - ${meta.title}`;
            },

            applyServerSourceMode(mode) {
                if (mode !== 'youtube' && mode !== 'icecast' && mode !== 'radio') {
                    return;
                }
                this.serverAudioMode = mode;
                if (this.userOverrideMode !== null && this.userOverrideMode !== mode) {
                    return;
                }
                if (this.audioMode === mode) {
                    return;
                }
                this.applySourceMode(mode);
            },

            applySourceMode(mode) {
                if (mode !== 'youtube' && mode !== 'icecast' && mode !== 'radio') {
                    return;
                }
                const modeChanged = this.audioMode !== mode;
                this.audioMode = mode;
                if (mode === 'youtube') {
                    if (modeChanged) {
                        // Only tear down the Icecast audio element when actually
                        // switching INTO youtube. Re-broadcasts of the same mode
                        // (queue transitions) must not reset status — the iframe
                        // is already showing/playing and we want loadYoutubeVideo
                        // to take it from there.
                        this.stopIcecastAudio();
                        this.status = this.audioEnabled ? 'buffering' : 'ready';
                    }
                    this.ensureYoutubePlayer();
                    // Prefer the freshest stashed item; fall back to whatever
                    // we last had as current, so a switch-back to YouTube can
                    // resume a paused video instead of doing nothing. Only
                    // kick playback if the user has already gestured via
                    // [ start audio ] — otherwise leave the item staged and
                    // let that click drive the first play.
                    const itemToPlay = this.pendingYoutubeItem || this.currentYoutubeItem;
                    if (itemToPlay && this.audioEnabled) {
                        this.playYoutubeItem(itemToPlay);
                    }
                } else {
                    // Pause (don't stop) so a later v+x flip back to YouTube
                    // can resume the same item with one playVideo() call.
                    if (this.ytPlayer && this.ytPlayer.pauseVideo) {
                        this.ytPlayer.pauseVideo();
                    }
                    this.autoplayBlocked = false;
                    this.unmuteOnNextPlay = false;
                    if (!this.streamElementEnabled()) {
                        this.stopIcecastAudio();
                        this.status = 'ready';
                    } else if (this.audioEnabled || this.status === 'playing' || this.status === 'buffering') {
                        this.startPlayback();
                    } else {
                        this.status = 'ready';
                    }
                }
                this.sendClientState();
            },

            ensureYoutubePlayer() {
                if (this.ytPlayer) {
                    return;
                }
                if (!window.YT || !window.YT.Player) {
                    this.loadYoutubeApi();
                    return;
                }
                this.ytPlayer = new window.YT.Player('yt-player', {
                    height: '180',
                    width: '320',
                    playerVars: {
                        playsinline: 1,
                        rel: 0,
                    },
                    events: {
                        onReady: () => {
                            this.ytReady = true;
                            this.ytPlayer.setVolume(this.volumePercent);
                            this.applyMuteState(this.muted);
                            if (this.pendingYoutubeItem) {
                                if (this.userOverrideMode !== 'icecast') {
                                    this.playYoutubeItem(this.pendingYoutubeItem);
                                }
                            }
                        },
                        onStateChange: (event) => this.handleYoutubeStateChange(event.data),
                        onError: (event) => this.sendYoutubeState('error', String(event.data || 'youtube error')),
                    }
                });
            },

            loadYoutubeApi() {
                if (window.lateYoutubeApiReady || window.lateYoutubeApiLoading) {
                    return;
                }
                window.lateYoutubeApiLoading = true;
                const script = document.createElement('script');
                script.src = 'https://www.youtube.com/iframe_api';
                script.async = true;
                document.head.appendChild(script);
            },

            loadYoutubeVideo(payload) {
                const item = {
                    itemId: payload.item_id,
                    videoId: payload.video_id,
                    isStream: !!payload.is_stream,
                };

                if (this.isStreamElementMode(this.userOverrideMode)) {
                    this.pendingYoutubeItem = item;
                    return;
                }
                this.audioMode = 'youtube';

                // Safety-net heartbeat no-op: same queued item AND iframe is
                // already showing the right video. Don't restart playback —
                // a paused user stays paused.
                if (
                    this.isSameYoutubeItem(this.currentYoutubeItem, item)
                    && this.loadedYoutubeVideoId() === item.videoId
                ) {
                    this.currentYoutubeItem = item;
                    this.pendingYoutubeItem = null;
                    return;
                }

                this.pendingYoutubeItem = item;
                this.ensureYoutubePlayer();
                // Once any youtube item is mounted in the iframe (fallback or
                // a queue item) the player has the autoplay gesture it needs to
                // load subsequent items. Don't gate switching on audioEnabled
                // in that case — otherwise queue transitions get stuck as
                // pending while the previous video keeps playing.
                const youtubeActive = !!(this.ytPlayer && this.ytReady && this.currentYoutubeItem);
                if (this.audioEnabled || youtubeActive || this.status === 'playing' || this.status === 'buffering') {
                    this.playYoutubeItem(item);
                } else {
                    this.status = 'ready';
                }
            },

            isSameYoutubeItem(a, b) {
                return !!a && !!b && a.itemId === b.itemId && a.videoId === b.videoId;
            },

            playYoutubeItem(item) {
                if (this.isStreamElementMode(this.userOverrideMode)) {
                    this.pendingYoutubeItem = item;
                    return;
                }
                if (!this.ytPlayer || !this.ytReady || !this.ytPlayer.loadVideoById) {
                    return;
                }
                const switchingItems = this.currentYoutubeItem && !this.isSameYoutubeItem(this.currentYoutubeItem, item);
                if (switchingItems && this.ytPlayer.stopVideo) {
                    this.ytPlayer.stopVideo();
                }
                const alreadyLoaded = !switchingItems
                    && this.loadedYoutubeVideoId() === item.videoId;
                this.pendingYoutubeItem = null;
                this.currentYoutubeItem = item;
                this.status = 'buffering';
                if (alreadyLoaded && this.ytPlayer.playVideo) {
                    this.ytPlayer.playVideo();
                } else {
                    this.ytPlayer.loadVideoById({ videoId: item.videoId });
                }
                this.verifyYoutubeLoad(item);
                this.detectAutoplayBlocked(item);
                this.ytPlayer.setVolume(this.volumePercent);
                this.applyMuteState(this.muted);
            },

            detectAutoplayBlocked(item) {
                const flagBlocked = () => {
                    if (this.isStreamElementMode(this.userOverrideMode)) {
                        return;
                    }
                    if (!this.isSameYoutubeItem(this.currentYoutubeItem, item)) {
                        return;
                    }
                    if (!this.ytPlayer || !this.ytPlayer.getPlayerState || !window.YT) {
                        return;
                    }
                    if (this.autoplayBlocked || this.status === 'playing') {
                        return;
                    }
                    this.autoplayBlocked = true;
                    this.status = 'ready';
                    this.sendYoutubeState('buffering');
                    if (this.unmuteOnNextPlay) {
                        this.unmuteOnNextPlay = false;
                        this.applyMuteState(this.muted);
                    }
                };

                const tryMutedRecovery = () => {
                    if (this.isStreamElementMode(this.userOverrideMode)) {
                        return;
                    }
                    if (!this.isSameYoutubeItem(this.currentYoutubeItem, item)) {
                        return;
                    }
                    if (!this.ytPlayer || !this.ytPlayer.mute || !this.ytPlayer.playVideo) {
                        flagBlocked();
                        return;
                    }
                    // Chrome's per-origin Media Engagement Index gates audible
                    // iframe autoplay. Muted autoplay is always allowed, so
                    // mute → play → unmute on PLAYING is the universal escape.
                    this.unmuteOnNextPlay = !this.muted;
                    this.ytPlayer.mute();
                    this.ytPlayer.playVideo();

                    // If even muted autoplay doesn't get us to PLAYING within
                    // 1.5s, fall back to the [ tap to play ] flow.
                    window.setTimeout(() => {
                        if (this.isStreamElementMode(this.userOverrideMode)) {
                            return;
                        }
                        if (!this.isSameYoutubeItem(this.currentYoutubeItem, item)) {
                            return;
                        }
                        if (!this.ytPlayer || !this.ytPlayer.getPlayerState || !window.YT) {
                            return;
                        }
                        const state = this.ytPlayer.getPlayerState();
                        if (state !== window.YT.PlayerState.PLAYING) {
                            flagBlocked();
                        }
                    }, 1500);
                };

                // First pass: at 800ms, if the player isn't already PLAYING,
                // attempt the muted-autoplay recovery before resorting to the
                // tap-to-play button.
                window.setTimeout(() => {
                    if (this.isStreamElementMode(this.userOverrideMode)) {
                        return;
                    }
                    if (!this.ytPlayer || !this.ytPlayer.getPlayerState || !window.YT) {
                        return;
                    }
                    const state = this.ytPlayer.getPlayerState();
                    if (state !== window.YT.PlayerState.PLAYING) {
                        tryMutedRecovery();
                    }
                }, 800);
            },

            handleYoutubeStateChange(state) {
                if (!window.YT) {
                    return;
                }
                if (!this.currentYoutubeItem && this.pendingYoutubeItem) {
                    const loadedVideoId = this.loadedYoutubeVideoId();
                    if (!loadedVideoId || loadedVideoId === this.pendingYoutubeItem.videoId) {
                        this.currentYoutubeItem = this.pendingYoutubeItem;
                        this.pendingYoutubeItem = null;
                    }
                }
                if (!this.currentYoutubeItem) {
                    return;
                }
                if (!this.youtubePlayerMatchesCurrent()) {
                    this.reloadCurrentYoutubeItem();
                    return;
                }
                if (this.isStreamElementMode(this.userOverrideMode)) {
                    if ((state === window.YT.PlayerState.PLAYING || state === window.YT.PlayerState.BUFFERING)
                        && this.ytPlayer && this.ytPlayer.pauseVideo
                    ) {
                        this.ytPlayer.pauseVideo();
                    }
                    if (!this.streamElementEnabled()) {
                        this.status = 'ready';
                    }
                    return;
                }
                if (state === window.YT.PlayerState.PLAYING) {
                    this.audioEnabled = true;
                    this.autoplayBlocked = false;
                    this.audioMode = 'youtube';
                    this.status = 'playing';
                    if (this.unmuteOnNextPlay) {
                        this.unmuteOnNextPlay = false;
                        this.applyMuteState(this.muted);
                    }
                    this.sendClientState();
                    this.sendYoutubeState('playing');
                } else if (state === window.YT.PlayerState.PAUSED) {
                    this.sendYoutubeState('paused');
                } else if (state === window.YT.PlayerState.BUFFERING) {
                    this.status = 'buffering';
                    this.sendYoutubeState('buffering');
                } else if (state === window.YT.PlayerState.ENDED) {
                    this.sendYoutubeState('ended');
                    this.status = 'buffering';
                }
            },

            loadedYoutubeVideoId() {
                if (!this.ytPlayer || !this.ytPlayer.getVideoData) {
                    return null;
                }
                const data = this.ytPlayer.getVideoData();
                if (!data || !data.video_id) {
                    return null;
                }
                return data.video_id;
            },

            youtubePlayerMatchesCurrent() {
                const loadedVideoId = this.loadedYoutubeVideoId();
                return !loadedVideoId || !this.currentYoutubeItem || loadedVideoId === this.currentYoutubeItem.videoId;
            },

            reloadCurrentYoutubeItem() {
                if (this.isStreamElementMode(this.userOverrideMode)) {
                    return;
                }
                if (!this.currentYoutubeItem || !this.ytPlayer || !this.ytPlayer.loadVideoById) {
                    return;
                }
                const now = Date.now();
                if (now - this.lastYoutubeReloadAt < 1000) {
                    return;
                }
                this.lastYoutubeReloadAt = now;
                const item = this.currentYoutubeItem;
                if (this.ytPlayer.stopVideo) {
                    this.ytPlayer.stopVideo();
                }
                this.ytPlayer.loadVideoById({ videoId: item.videoId });
            },

            verifyYoutubeLoad(item) {
                window.setTimeout(() => {
                    if (this.isStreamElementMode(this.userOverrideMode)) {
                        return;
                    }
                    if (!this.isSameYoutubeItem(this.currentYoutubeItem, item)) {
                        return;
                    }
                    if (!this.youtubePlayerMatchesCurrent()) {
                        this.reloadCurrentYoutubeItem();
                    }
                }, 1000);
            },

            sendYoutubeState(state, error = null) {
                if (!this.ws || this.ws.readyState !== WebSocket.OPEN || !this.currentYoutubeItem) {
                    return;
                }
                if (!this.youtubePlayerMatchesCurrent()) {
                    this.reloadCurrentYoutubeItem();
                    return;
                }
                let offsetMs = 0;
                let durationMs = null;
                if (this.ytPlayer && this.ytPlayer.getCurrentTime) {
                    offsetMs = Math.floor(this.ytPlayer.getCurrentTime() * 1000);
                }
                if (this.ytPlayer && this.ytPlayer.getDuration) {
                    const durationSeconds = this.ytPlayer.getDuration();
                    if (Number.isFinite(durationSeconds) && durationSeconds > 0) {
                        durationMs = Math.floor(durationSeconds * 1000);
                    }
                }
                this.ws.send(JSON.stringify({
                    event: 'player_state',
                    item_id: this.currentYoutubeItem.itemId,
                    state,
                    offset_ms: offsetMs,
                    duration_ms: durationMs,
                    autoplay_blocked: this.autoplayBlocked,
                    error,
                }));
            }
        }
    }
</script>

<div x-data="player()" class="max-w-lg mx-auto pt-8 sm:pt-16">

    <div class="mb-10">
        <h1 class="text-2xl text-green-500 tracking-tight">late.sh</h1>
        <p class="text-gray-600 mt-1 text-sm">audio link</p>
    </div>

    <div class="mb-8 text-sm" x-cloak>
        <template x-if="status === 'connecting'">
            <div class="flex items-center gap-2.5 text-yellow-600">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-current animate-pulse"></span>
                connecting to terminal...
            </div>
        </template>
        <template x-if="status === 'ready'">
            <div class="flex items-center gap-2.5 text-green-600">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-current"></span>
                linked to your terminal
            </div>
        </template>
        <template x-if="status === 'buffering'">
            <div class="flex items-center gap-2.5 text-yellow-500">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-current animate-pulse"></span>
                <span x-text="audioMode === 'youtube' ? 'loading video...' : 'buffering stream...'"></span>
            </div>
        </template>
        <template x-if="status === 'playing'">
            <div class="flex items-center gap-2.5 text-green-500">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-current animate-pulse"></span>
                <span x-text="audioMode === 'youtube' ? 'playing YouTube' : 'streaming'"></span>
            </div>
        </template>
        <template x-if="status === 'disconnected'">
            <div class="flex items-center gap-2.5 text-gray-600">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-current"></span>
                disconnected
            </div>
        </template>
    </div>

    <div class="mb-8 border-l-2 border-gray-800 pl-4 text-xs space-y-1" x-cloak>
        <div>
            <span class="text-gray-600 inline-block w-16">source</span>
            <span class="text-green-600" x-text="sourceBannerText()"></span>
        </div>
        <div>
            <span class="text-gray-600 inline-block w-16">playing</span>
            <span class="text-gray-400" x-text="nowPlayingText()"></span>
        </div>
        <div x-show="audioMode === 'radio'">
            <span class="text-gray-600 inline-block w-16"></span>
            <a href="https://nightride.fm" target="_blank" rel="noopener"
                class="text-gray-600 hover:text-green-600 transition-colors">via nightride.fm</a>
        </div>
    </div>

    <div x-cloak x-show="audioMode === 'youtube'" class="mb-8">
        <div id="yt-player" class="w-[320px] max-w-full aspect-video bg-black"></div>
    </div>

    <div class="space-y-3" x-cloak>
        <button @click="startPlayback"
            x-show="!(isStreamElementMode() && !webIcecastEnabled) && status !== 'playing' && (status === 'ready' || status === 'disconnected' || status === 'buffering' || autoplayBlocked)"
            :disabled="status === 'buffering' && !autoplayBlocked"
            class="w-full text-left border px-4 py-3 text-sm transition-colors duration-200" :class="(status === 'buffering' && !autoplayBlocked)
                    ? 'border-gray-800 text-gray-600 cursor-wait'
                    : 'border-gray-700 hover:border-green-900 text-gray-300 hover:text-green-500 bg-gray-900/40'"
            x-text="autoplayBlocked ? '[ tap to play ]' : (status === 'buffering' ? '[ buffering... ]' : '[ start audio ]')">
        </button>

        <button @click="disconnect" x-show="status === 'playing'"
            class="w-full text-left border border-gray-800 hover:border-gray-600 px-4 py-3 text-sm text-gray-600 hover:text-gray-400 transition-colors duration-200">
            [ disconnect ]
        </button>
    </div>

    <div x-cloak x-show="status === 'playing'" class="mt-8 text-xs text-gray-700">
        keep this tab open in the background<br>
        control volume from your terminal or OS
    </div>

    <div class="mt-14 border-t border-gray-800 pt-5">
        <button @click="copy('curl -fsSL https://cli.late.sh/install.sh | bash')"
            class="group w-full text-left px-4 py-3 transition-colors duration-200 border border-gray-800 hover:border-green-950 bg-gray-900/20">
            <div class="flex items-center justify-between gap-4">
                <span class="text-xs text-gray-400 min-w-0 truncate">
                    <span class="text-gray-600">$ </span>
                    <span class="text-gray-300">curl -fsSL https://cli.late.sh/install.sh | bash</span>
                </span>
                <span class="shrink-0 text-right text-xs">
                    <span x-cloak x-show="copied !== 'curl -fsSL https://cli.late.sh/install.sh | bash'"
                        class="text-gray-700 group-hover:text-gray-500 transition-colors">copy</span>
                    <span x-cloak x-show="copied === 'curl -fsSL https://cli.late.sh/install.sh | bash'"
                        class="text-green-600">copied</span>
                </span>
            </div>
            <div class="mt-2 text-xs text-gray-600">
                skip the browser on macOS, Linux, or Termux
            </div>
        </button>

        <button @click="copy('irm https://cli.late.sh/install.ps1 | iex')"
            class="group w-full text-left mt-3 px-4 py-3 transition-colors duration-200 border border-gray-800 hover:border-green-950 bg-gray-900/20">
            <div class="flex items-center justify-between gap-4">
                <span class="text-xs text-gray-400 min-w-0 truncate">
                    <span class="text-gray-600">PS&gt; </span>
                    <span class="text-gray-300">irm https://cli.late.sh/install.ps1 | iex</span>
                </span>
                <span class="shrink-0 text-right text-xs">
                    <span x-cloak x-show="copied !== 'irm https://cli.late.sh/install.ps1 | iex'"
                        class="text-gray-700 group-hover:text-gray-500 transition-colors">copy</span>
                    <span x-cloak x-show="copied === 'irm https://cli.late.sh/install.ps1 | iex'"
                        class="text-green-600">copied</span>
                </span>
            </div>
            <div class="mt-2 text-xs text-gray-600">
                skip the browser on Windows PowerShell
            </div>
        </button>
    </div>

    <audio x-ref="audio" preload="none" crossorigin="anonymous" class="hidden"></audio>
</div>
{% endblock %}
