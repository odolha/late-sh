name: ci

on:
  workflow_call:
    inputs:
      package:
        description: "Cargo package to check (empty = whole workspace)"
        required: false
        type: string
        default: ""
      source_ref:
        description: "Git ref to check out"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref || github.ref }}
      - name: install_rustfmt
        run: rustup component add rustfmt
      - name: cargo_fmt_check
        run: cargo fmt --all -- --check

  clippy-test:
    name: clippy + test
    needs: [fmt]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref || github.ref }}
      - name: install_linux_build_dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libwebkit2gtk-4.1-dev pkg-config mold
      - name: restore_rust_cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust
          cache-targets: false
      - name: install_clippy
        run: rustup component add clippy
      - name: cargo_clippy
        env:
          CARGO_PACKAGE: ${{ inputs.package }}
        run: |
          package_args=(--workspace)
          if [ -n "$CARGO_PACKAGE" ]; then
            package_args=(-p "$CARGO_PACKAGE")
          fi

          cargo clippy "${package_args[@]}" --all-targets --features otel -- -D warnings
      - name: install_nextest
        uses: taiki-e/install-action@nextest
      - name: cargo_test
        env:
          TEST_DATABASE_URL: "host=127.0.0.1 port=5432 user=test password=test dbname=postgres"
          CARGO_PACKAGE: ${{ inputs.package }}
        run: |
          package_args=(--workspace)
          if [ -n "$CARGO_PACKAGE" ]; then
            package_args=(-p "$CARGO_PACKAGE")
          fi

          cargo nextest run "${package_args[@]}" --all-targets
