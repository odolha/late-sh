name: deploy_dopewars

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy, for example v0.27.11-dopewars"
        required: true
        type: string
      environment:
        description: "Deployment environment"
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ ((github.event_name == 'workflow_dispatch' && endsWith(inputs.release_tag, '-dopewars')) || (github.event_name != 'workflow_dispatch' && endsWith(github.ref, '-dopewars'))) && format('deploy-dopewars-{0}', github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production')) || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: ci
    if: ${{ (github.event_name == 'workflow_dispatch' && endsWith(inputs.release_tag, '-dopewars')) || (github.event_name != 'workflow_dispatch' && endsWith(github.ref, '-dopewars')) }}
    uses: ./.github/workflows/ci.yml
    with:
      package: late-dopewars
      source_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

  build_dopewars:
    name: build_late_dopewars_image
    if: ${{ (github.event_name == 'workflow_dispatch' && endsWith(inputs.release_tag, '-dopewars')) || (github.event_name != 'workflow_dispatch' && endsWith(github.ref, '-dopewars')) }}
    needs: ci
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      registry: ghcr.io
      image_name: late-dopewars
      image_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
      context: .
      dockerfile: ./Dockerfile
      docker_target: runtime-dopewars
      environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
      source_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

  get_images:
    name: get_current_ssh_web_image_tags
    if: ${{ (github.event_name == 'workflow_dispatch' && endsWith(inputs.release_tag, '-dopewars')) || (github.event_name != 'workflow_dispatch' && endsWith(github.ref, '-dopewars')) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
    outputs:
      ssh_image_tag: ${{ steps.ssh_image.outputs.image_tag }}
      web_image_tag: ${{ steps.web_image.outputs.image_tag }}
      nethack_image_tag: ${{ steps.nethack_image.outputs.image_tag }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: get_ssh_image_tag
        id: ssh_image
        run: |
          tag=$(kubectl get deployment service-ssh -n default -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: get_web_image_tag
        id: web_image
        run: |
          tag=$(kubectl get deployment service-web -n default -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: get_nethack_image_tag
        id: nethack_image
        run: |
          tag=$(kubectl get deployment late-nethack -n default -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

  terraform:
    name: terraform_apply
    if: ${{ (github.event_name == 'workflow_dispatch' && endsWith(inputs.release_tag, '-dopewars')) || (github.event_name != 'workflow_dispatch' && endsWith(github.ref, '-dopewars')) }}
    needs: [build_dopewars, get_images]
    uses: ./.github/workflows/terraform.yml
    permissions:
      contents: read
    secrets: inherit
    with:
      ssh_image_tag: ${{ needs.get_images.outputs.ssh_image_tag }}
      web_image_tag: ${{ needs.get_images.outputs.web_image_tag }}
      nethack_image_tag: ${{ needs.get_images.outputs.nethack_image_tag }}
      dopewars_image_tag: ${{ needs.build_dopewars.outputs.image_tag }}
      environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
      source_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

  wait_for_dopewars_rollout:
    name: wait_for_dopewars_rollout
    if: ${{ (github.event_name == 'workflow_dispatch' && endsWith(inputs.release_tag, '-dopewars')) || (github.event_name != 'workflow_dispatch' && endsWith(github.ref, '-dopewars')) }}
    needs: terraform
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: wait_for_rollout
        run: kubectl rollout status deployment late-dopewars -n default --timeout=180s
