services:
  postgres:
    image: postgres:18
    ports:
      - "${CHECK_PG_HOST_PORT:-55433}:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    stop_grace_period: 2m
